<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyTrainer — Aprendé Python</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Skulpt: Python en el navegador -->
    <script src="https://skulpt.org/js/skulpt.min.js"></script>
    <script src="https://skulpt.org/js/skulpt-stdlib.js"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Config de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"SF Mono"', '"Fira Code"', '"Cascadia Code"', '"JetBrains Mono"', 'Consolas', 'monospace'],
                    },
                },
            },
        };
    </script>
</head>
<body class="h-full bg-slate-900 text-slate-100 antialiased">

    <!-- App container -->
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header id="app-header" class="bg-slate-800/80 border-b border-slate-700/50 px-4 py-3 sticky top-0 z-40 backdrop-blur-sm">
        </header>

        <!-- Main content -->
        <main id="main-content" class="flex-1 px-4 py-6 overflow-y-auto">
            <!-- Loading state mientras carga -->
            <div id="loading-placeholder" class="flex flex-col items-center justify-center py-20 animate-fade-in">
                <div class="text-5xl mb-4">🐍</div>
                <div class="text-slate-400 text-lg mb-2">Cargando PyTrainer...</div>
                <div class="w-48 h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-500 rounded-full animate-pulse" style="width: 60%"></div>
                </div>
                <p class="text-slate-600 text-sm mt-4">Preparando ejercicios y motor de Python</p>
            </div>
        </main>

        <!-- Level navigation footer -->
        <footer id="level-nav" class="bg-slate-800/50 border-t border-slate-700/50 px-4">
        </footer>
    </div>

    <!-- Scripts del juego -->
    <script src="js/levels.js"></script>
    <script src="js/questions.js"></script>
    <script src="js/checker.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
